<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameStock Assistant | Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <p class="eyebrow">Front-end + C# API</p>
        <h1>GameStock Assistant</h1>
        <p class="sidebar-description">
          A conversational interface for managing products, consoles, batches, and inventory.
        </p>
      </div>

      <section class="metrics" id="metrics">
        <article>
          <span id="metricProducts">0</span>
          <small>Products</small>
        </article>
        <article>
          <span id="metricUnits">0</span>
          <small>Units</small>
        </article>
        <article>
          <span id="metricValue">$0.00</span>
          <small>Total value</small>
        </article>
      </section>

      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <span class="status-dot"></span>
          <strong id="userGreeting">Hello!</strong>
          <p>Choose an action below or follow the assistant instructions.</p>
        </div>
      </header>

      <section class="chat-window" id="chatWindow" aria-live="polite"></section>

      <footer class="quick-actions" id="quickActions">
        <button data-action="list">View inventory</button>
        <button data-action="create">Add product</button>
        <button data-action="search">Find product</button>
        <button data-action="update">Update product</button>
        <button data-action="alerts">Alerts</button>
        <button data-action="summary">Summary</button>
      </footer>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
